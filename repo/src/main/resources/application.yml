server:
  port: 8080
  servlet:
    context-path: /
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/exam_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

app:
  security:
    replay-window-seconds: 120
    hmac-secret: "replace-with-strong-intranet-secret"
    aes-base64-key: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
    user-rate-limit-per-minute: 60
    ip-rate-limit-per-minute: 300
    request-size-max-bytes: 10485760
    session-idle-timeout-minutes: 30
    remember-device-max-days: 7
  job:
    node-index: 0
    total-shards: 1
    poll-batch-size: 50
  wechat:
    enabled: false

logging:
  level:
    com.exam.system: INFO
