spring:
  datasource:
    url: jdbc:h2:mem:examdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: false

app:
  security:
    replay-window-seconds: 120
    hmac-secret: "test-secret"
    aes-base64-key: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
    user-rate-limit-per-minute: 60
    ip-rate-limit-per-minute: 300
    request-size-max-bytes: 10485760
    session-idle-timeout-minutes: 30
    remember-device-max-days: 7
  job:
    node-index: 0
    total-shards: 1
    poll-batch-size: 50
  wechat:
    enabled: false
